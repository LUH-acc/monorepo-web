# HTTP 站点配置模板（初始化脚本会替换为目标域名）
server {
    listen 80;
    listen [::]:80;
    server_name chuankeji.com www.chuankeji.com;

    root /var/www/html;
    index index.html index.htm;

    # 预留 ACME 校验路径（后续若接入证书可直接复用）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}